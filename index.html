<!DOCTYPE html>
<html>
<head>
    <title>Sakura Cafe Menu</title>

    <style>
        body {
            font-family: Arial;
            background-color: #fff0f5;
        }

        h1 {
            text-align: center;
            color: #b03060;
        }

        .menu {
            width: 400px;
            height: 550px;
            margin: 20px auto;
            padding: 20px;
            color: white;
            border: 3px solid pink;

            background-size: cover;
            background-position: center;

            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .content {
            position: relative;
            z-index: 2;
        }
    </style>
</head>

<body>

<h1>Sakura Cafe Menu</h1>

<!-- Breakfast -->
<div class="menu" style="background-image: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93');">
    <div class="overlay"></div>

    <div class="content">
        <h2>Breakfast</h2>
        <p>Pancakes - $6</p>
        <p>Toast with Eggs - $5</p>
        <p>Fruit Bowl - $4</p>
        <p>Green Tea - $3</p>
    </div>
</div>

<!-- Lunch -->
<div class="menu" style="background-image: url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c');">
    <div class="overlay"></div>

    <div class="content">
        <h2>Lunch</h2>
        <p>Chicken Sandwich - $8</p>
        <p>Caesar Salad - $7</p>
        <p>Vegetable Soup - $6</p>
        <p>Lemonade - $3</p>
    </div>
</div>

<!-- Dinner -->
<div class="menu" style="background-image: url('https://images.unsplash.com/photo-1553621042-f6e147245754');">
    <div class="overlay"></div>

    <div class="content">
        <h2>Dinner</h2>
        <p>Sushi Set - $12</p>
        <p>Ramen - $11</p>
        <p>Chocolate Cake - $5</p>
    </div>
</div>

</body>
</html>
